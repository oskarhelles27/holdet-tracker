name: Scrape Holdet data

on:
  schedule:
    # Team rosters only reflect the current round once that round's trading
    # window closes (the "Handel lukker" deadline in the Holdet app) - see
    # /api/schedules/618, each round's "close" timestamp. Across all 21
    # stages of the 2026 Tour that falls between 09:20 and 15:05 UTC, so we
    # poll every 30 min through that window to pick up the new rosters
    # shortly after they unlock, rather than waiting for a single nightly run.
    # Extended to 19:00 UTC since scoring is sometimes posted late.
    - cron: '*/30 8-19 * * *'
    # Nightly fallback in case an intraday run fails for some reason.
    - cron: '0 20 * * *'
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          HOLDET_COOKIE: ${{ secrets.HOLDET_COOKIE }}
        run: python scraper/scrape.py

      - name: Commit and push new snapshot
        run: |
          git config user.name "holdet-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/
          [ -d debug ] && git add debug/ || true
          git diff --quiet --cached || git commit -m "Update Holdet snapshot ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
