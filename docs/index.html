<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuentes Bagmænd tracker</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<script>
  (function () {
    var theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e5e5e0;
    --text: #1a1a1a;
    --text-muted: #6b6b66;
    --accent: #1D9E75;
    --accent-bg: #E1F5EE;
    --negative: #D85A30;
  }
  :root[data-theme="dark"] {
    --bg: #15171a;
    --surface: #1c1f24;
    --border: #2d3138;
    --text: #eaeaea;
    --text-muted: #9a9da3;
    --accent: #2ED9A0;
    --accent-bg: #16362C;
    --negative: #E2725A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 16px 64px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .title-row { display: flex; align-items: center; gap: 10px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; }
  .subtitle { color: var(--text-muted); font-size: 13px; }
  .round-badge { display: inline-block; background: #E3EFFC; color: #1D64B0; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  :root[data-theme="dark"] .round-badge { background: #1C3A5C; color: #82BBEF; }
  .theme-toggle { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; flex-shrink: 0; }
  .theme-toggle:hover { color: var(--text); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .about-footer { color: var(--text-muted); font-size: 12px; margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tabs button { font-size: 14px; font-weight: 500; padding: 10px 16px; border: none; background: none; color: var(--text-muted); cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  select#round-select { font-size: 14px; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; border-left: 3px solid transparent; }
  .stat-card--in { border-left-color: var(--accent); }
  .stat-card--out { border-left-color: var(--negative); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-value--riders { font-size: 15px; font-weight: 600; display: flex; flex-direction: column; gap: 4px; }
  .stat-rider-row { display: flex; align-items: center; gap: 6px; }
  .stat-rider-row .jersey-icon { margin-right: 0; }
  .stat-sublabel { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  h2 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
  section { margin-bottom: 36px; }

  .overview-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 24px; align-items: start; }
  @media (max-width: 800px) { .overview-grid { grid-template-columns: 1fr; } }

  .popularity-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
  .popularity-row summary { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; padding: 6px 8px; cursor: pointer; list-style: none; }
  .popularity-row summary::-webkit-details-marker { display: none; }
  .popularity-row .rider-name { font-weight: 500; font-size: 13px; }
  .popularity-row .pro-team { display: none; }
  .jersey-icon { width: 18px; height: 18px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: 6px; }
  .bar-wrap { display: flex; align-items: center; gap: 6px; }
  .bar-track { width: 56px; height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); }
  .bar-count { font-size: 12px; color: var(--text-muted); width: 34px; text-align: right; }
  .owner-list { list-style: none; margin: 0; padding: 4px 12px 10px 32px; }
  .owner-list li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .owner-list li:last-child { border-bottom: none; }
  .new-tag { font-size: 11px; background: var(--accent-bg); color: var(--accent); padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; }
  .crown-tag { font-size: 11px; background: #FAEEDA; color: #854F0B; padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; }

  .activity-module { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .activity-team { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .activity-team:last-child { border-bottom: none; }
  .activity-team-name { font-weight: 500; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .trade-header-row { display: grid; grid-template-columns: 1fr 20px 1fr; column-gap: 10px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; padding-bottom: 6px; margin-bottom: 4px; border-bottom: 1px solid var(--border); }
  .trade-row { display: grid; grid-template-columns: 1fr 20px 1fr; column-gap: 10px; align-items: center; font-size: 13px; padding: 4px 0; }
  .trade-rider { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .trade-rider .jersey-icon { margin-right: 0; flex-shrink: 0; }
  .trade-rider span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trade-arrow { color: var(--text-muted); text-align: center; }
  .activity-empty { color: var(--text-muted); font-size: 13px; }
  .activity-fallback-note { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }

  .diff-module { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .diff-item { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .diff-item:last-child { border-bottom: none; }
  .diff-item-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .diff-item-name { display: flex; align-items: center; font-weight: 500; }
  .diff-item-sub { color: var(--text-muted); font-size: 12px; margin-top: 3px; }
  .diff-empty { padding: 14px; color: var(--text-muted); font-size: 13px; }

  .standings { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; font-size: 13px; }
  .standings-header, .standings-row summary { display: grid; grid-template-columns: 28px 1fr 110px 74px 120px; align-items: center; gap: 8px; padding: 10px 12px; }
  .standings-header { color: var(--text-muted); font-weight: 500; font-size: 12px; border-bottom: 1px solid var(--border); }
  .standings-header .num, .standings-row .num { text-align: right; }
  .standings-row { border-bottom: 1px solid var(--border); }
  .standings-row:last-child { border-bottom: none; }
  .standings-row summary { cursor: pointer; list-style: none; }
  .standings-row summary::-webkit-details-marker { display: none; }
  .standings-row .team-name { display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .chevron { display: inline-block; color: var(--text-muted); transition: transform 0.15s ease; font-size: 10px; }
  details[open] .chevron { transform: rotate(90deg); }
  .roster-list { list-style: none; margin: 0; padding: 4px 12px 12px 46px; }
  .roster-list li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .roster-list li:last-child { border-bottom: none; }
  .captain-tag { font-size: 11px; background: #FAEEDA; color: #854F0B; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .unique-tag { font-size: 11px; background: #EDE9FE; color: #6D28D9; padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; }
  .transfer-tag { font-size: 11px; background: var(--accent-bg); color: var(--accent); padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; }
  .transfer-pill { display: inline-block; min-width: 20px; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; text-align: center; }

  .pts-positive { color: var(--accent); font-weight: 500; }
  .pts-negative { color: var(--negative); font-weight: 500; }

  .error { background: #FCEBEB; color: #791F1F; padding: 12px 16px; border-radius: 8px; }
  .loading { color: var(--text-muted); padding: 24px 0; }

  .chart-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .chart-toggle button { font-size: 13px; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-family: inherit; }
  .chart-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chart-container { position: relative; height: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }

  .overlap-matrix-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .overlap-matrix { display: grid; gap: 3px; font-size: 12px; align-items: center; }
  .overlap-row-header { padding-right: 8px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .overlap-col-header { text-align: center; color: var(--text-muted); font-weight: 600; padding-bottom: 4px; }
  .overlap-cell { height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; }
  .overlap-cell.overlap-diag { background: transparent; cursor: default; }
  .overlap-cell:not(.overlap-diag):hover { outline: 2px solid var(--text); outline-offset: -2px; }
  .overlap-detail { margin-top: 16px; }
  .overlap-detail h3 { font-size: 14px; font-weight: 600; margin: 0 0 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="title-row">
        <h1>Fuentes Bagmænd tracker</h1>
        <div id="round-badge"></div>
      </div>
      <div class="subtitle" id="scraped-at">Loading...</div>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <div id="content">
    <div class="loading">Loading data...</div>
  </div>

  <div class="about-footer">
    This is an unofficial personal project for a private Holdet fantasy cycling league — not affiliated with or endorsed by Holdet. Built for fun by the group.
  </div>
</div>

<script>
const THEME_ICONS = {
  sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>',
  moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>',
};

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.innerHTML = theme === 'dark' ? THEME_ICONS.sun : THEME_ICONS.moon;
}

(function initThemeToggle() {
  const initial = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(initial);
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });
})();

async function loadData() {
  const contentEl = document.getElementById('content');
  try {
    const res = await fetch('data/latest.json?_=' + Date.now());
    if (!res.ok) throw new Error('No data yet - run the scraper at least once (see README).');
    const data = await res.json();
    render(data);
  } catch (err) {
    contentEl.innerHTML = `<div class="error">Couldn't load data: ${err.message}</div>`;
  }
}

function formatDkk(n) {
  if (n === null || n === undefined) return '-';
  return n.toLocaleString('da-DK');
}

function formatSignedPts(n) {
  if (n === null || n === undefined) return '-';
  const cls = n < 0 ? 'pts-negative' : 'pts-positive';
  const sign = n < 0 ? '-' : '+';
  return `<span class="${cls}">${sign}${Math.abs(n).toLocaleString('da-DK')}</span>`;
}

function buildProTeamAbbrMap(masterRiders) {
  const map = {};
  for (const rider of Object.values(masterRiders || {})) {
    if (rider.pro_team && rider.pro_team_abbr) map[rider.pro_team] = rider.pro_team_abbr;
  }
  return map;
}

function jerseyIcon(proTeam, abbrMap) {
  const abbr = abbrMap[proTeam];
  if (!abbr) return '';
  return `<img class="jersey-icon" src="assets/jerseys/${abbr}.png" alt="" onerror="this.remove()">`;
}

function cartIcon(color) {
  return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>`;
}

function tagIcon(color) {
  return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>`;
}

function statRiderRows(list, proTeamAbbr) {
  return list.map(p => `<div class="stat-rider-row">${jerseyIcon(p.pro_team, proTeamAbbr)}<span>${p.name}</span></div>`).join('');
}

function computeTeamTrades(teams, roundBaseline) {
  // Per team, the riders dropped and added since the round started. Holdet
  // only gives us set differences (who left, who joined), not slot-level
  // swap history, so when a team makes more than one change at once there's
  // no way to know which specific outgoing rider was swapped for which
  // incoming one - we pair them positionally (both sides sorted by value,
  // highest first) as a best-effort visual pairing, not a verified one.
  const baselineByTeamId = {};
  for (const b of (roundBaseline || [])) baselineByTeamId[b.team_id] = b;

  return teams.map(t => {
    const baseline = baselineByTeamId[t.team_id];
    if (!baseline) return { team: t, trades: [] };

    const prevByKey = {};
    for (const r of baseline.roster) prevByKey[`${r.name}|${r.pro_team}`] = r;
    const curByKey = {};
    for (const r of t.roster) curByKey[`${r.name}|${r.pro_team}`] = r;

    const outRiders = Object.keys(prevByKey)
      .filter(key => !curByKey[key])
      .map(key => prevByKey[key])
      .sort((a, b) => (b.value || 0) - (a.value || 0));
    const inRiders = Object.keys(curByKey)
      .filter(key => !prevByKey[key])
      .map(key => curByKey[key])
      .sort((a, b) => (b.value || 0) - (a.value || 0));

    const trades = [];
    for (let i = 0; i < Math.max(outRiders.length, inRiders.length); i++) {
      trades.push({ out: outRiders[i] || null, in: inRiders[i] || null });
    }
    return { team: t, trades };
  });
}

function renderTransferActivity(teamTrades, proTeamAbbr) {
  const sorted = [...teamTrades].sort((a, b) => b.trades.length - a.trades.length);
  return `
    <div class="activity-module">
      ${sorted.map(({ team, trades }) => `
        <div class="activity-team">
          <div class="activity-team-name">${team.header.team_name || team.label}<span style="color:var(--text-muted); font-size:12px; font-weight:400;">${trades.length} transfer${trades.length === 1 ? '' : 's'} this round</span></div>
          ${trades.length ? `
            <div class="trade-header-row"><span style="color:var(--negative);">Out</span><span></span><span style="color:var(--accent);">In</span></div>
            ${trades.map(({ out, in: inRider }) => `
              <div class="trade-row">
                <span class="trade-rider">${out ? `${jerseyIcon(out.pro_team, proTeamAbbr)}<span>${out.name}</span>` : ''}</span>
                <span class="trade-arrow">${out && inRider ? '→' : ''}</span>
                <span class="trade-rider">${inRider ? `${jerseyIcon(inRider.pro_team, proTeamAbbr)}<span>${inRider.name}</span>` : ''}</span>
              </div>
            `).join('')}
          ` : `<div class="activity-empty">No trades this round</div>`}
        </div>
      `).join('')}
    </div>
  `;
}

function buildRoundPointsByRider(teams) {
  const pointsByRider = {};
  for (const t of teams) {
    for (const r of t.roster) {
      if (r.round_points === null || r.round_points === undefined) continue;
      const key = `${r.name}|${r.pro_team}`;
      if (!(key in pointsByRider)) pointsByRider[key] = r.round_points;
    }
  }
  return pointsByRider;
}

function computeDifferentialWatch(popularity, pointsByRider, maxOwners) {
  return popularity
    .filter(p => p.owned_by_count <= maxOwners)
    .map(p => ({ ...p, round_points: pointsByRider[`${p.name}|${p.pro_team}`] }))
    .filter(p => p.round_points !== undefined && p.round_points > 0)
    .sort((a, b) => b.round_points - a.round_points);
}

function renderDifferentialWatch(list, teamsLength, proTeamAbbr, labelToTeamName, limit) {
  const rows = list.slice(0, limit);
  if (!rows.length) {
    return `<div class="diff-module"><div class="diff-empty">No under-owned riders have gained value this round yet.</div></div>`;
  }
  return `
    <div class="diff-module">
      ${rows.map(p => `
        <div class="diff-item">
          <div class="diff-item-top">
            <span class="diff-item-name">${jerseyIcon(p.pro_team, proTeamAbbr)}${p.name}</span>
            <span>${formatSignedPts(p.round_points)}</span>
          </div>
          <div class="diff-item-sub">${p.owned_by_count}/${teamsLength} teams · ${p.owned_by_teams.map(l => labelToTeamName[l] || l).join(', ')}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function computeTeamTransferCounts(teams, groupPopularity) {
  // Count riders newly added per team this round. Roster size is fixed, so
  // the number dropped always equals the number added (|A\B| = |B\A| when
  // |A| = |B|) - counting only the "in" side already gives the true number
  // of swaps, without double-counting each swap as both an in and an out.
  const counts = {};
  for (const t of teams) counts[t.label] = 0;
  for (const p of groupPopularity) {
    for (const label of (p.transferred_in_by_teams || [])) {
      counts[label] = (counts[label] || 0) + 1;
    }
  }
  return counts;
}

function median(nums) {
  if (!nums.length) return null;
  const sorted = [...nums].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

function accentIntensity(ratio) {
  const light = [225, 245, 238]; // --accent-bg
  const dark = [29, 158, 117];   // --accent
  const rgb = light.map((c, i) => Math.round(c + (dark[i] - c) * ratio));
  const text = ratio > 0.55 ? '#ffffff' : '#0f5c42';
  return { bg: `rgb(${rgb.join(',')})`, text };
}

function transferPill(count, maxCount) {
  const ratio = maxCount > 0 ? count / maxCount : 0;
  const { bg, text } = accentIntensity(ratio);
  return `<span class="transfer-pill" style="background:${bg}; color:${text};">${count}</span>`;
}

function computeOverlapCounts(teams) {
  const rosterKeys = teams.map(t => new Set(t.roster.map(r => `${r.name}|${r.pro_team}`)));
  const n = teams.length;
  const counts = Array.from({ length: n }, () => Array(n).fill(0));
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      let c = 0;
      for (const key of rosterKeys[i]) if (rosterKeys[j].has(key)) c++;
      counts[i][j] = c;
    }
  }
  return counts;
}

function sharedRiders(teamA, teamB) {
  const bKeys = new Set(teamB.roster.map(r => `${r.name}|${r.pro_team}`));
  return teamA.roster.filter(r => bKeys.has(`${r.name}|${r.pro_team}`));
}

function renderOverlapMatrix(standings) {
  const n = standings.length;
  const counts = computeOverlapCounts(standings);
  const maxOverlap = Math.max(0, ...counts.flat());

  let cells = `<div class="overlap-cell overlap-corner"></div>`;
  for (let j = 0; j < n; j++) {
    const name = standings[j].header.team_name || standings[j].label;
    cells += `<div class="overlap-col-header" title="${name}">${j + 1}</div>`;
  }
  for (let i = 0; i < n; i++) {
    const name = standings[i].header.team_name || standings[i].label;
    cells += `<div class="overlap-row-header">${i + 1}. ${name}</div>`;
    for (let j = 0; j < n; j++) {
      if (i === j) {
        cells += `<div class="overlap-cell overlap-diag"></div>`;
      } else {
        const count = counts[i][j];
        const ratio = maxOverlap > 0 ? count / maxOverlap : 0;
        const { bg, text } = accentIntensity(ratio);
        cells += `<div class="overlap-cell" data-row="${i}" data-col="${j}" style="background:${bg}; color:${text};">${count}</div>`;
      }
    }
  }

  return `
    <div class="overlap-matrix-wrap">
      <div class="overlap-matrix" style="grid-template-columns: 160px repeat(${n}, 36px);">
        ${cells}
      </div>
    </div>
    <div id="overlap-detail" class="overlap-detail"></div>
  `;
}

const TEAM_COLORS = [
  '#1D9E75', '#E07A5F', '#3D5A80', '#EE6C4D', '#8338EC',
  '#C9A227', '#06AED5', '#D62839', '#6A994E', '#B5838D',
];

function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function computeGroupRanksByRound(teams) {
  // rank teams 1-N against each other for each round, by total_value (1 = highest value)
  const perRound = {};
  for (const t of teams) {
    for (const h of t.history || []) {
      if (!perRound[h.round]) perRound[h.round] = [];
      perRound[h.round].push({ label: t.label, value: h.total_value });
    }
  }
  const ranks = {};
  for (const t of teams) ranks[t.label] = {};
  for (const round of Object.keys(perRound)) {
    const sorted = perRound[round].slice().sort((a, b) => (b.value || 0) - (a.value || 0));
    sorted.forEach((entry, i) => { ranks[entry.label][round] = i + 1; });
  }
  return ranks;
}

function buildTrajectoryDatasets(teams, mode) {
  const roundsSet = new Set();
  teams.forEach(t => (t.history || []).forEach(h => roundsSet.add(h.round)));
  const rounds = [...roundsSet].sort((a, b) => a - b);

  const groupRanks = mode === 'group-rank' ? computeGroupRanksByRound(teams) : null;

  const datasets = teams.map((t, i) => {
    const color = TEAM_COLORS[i % TEAM_COLORS.length];
    const byRound = {};
    (t.history || []).forEach(h => { byRound[h.round] = h; });
    const data = rounds.map(r => {
      const h = byRound[r];
      if (mode === 'group-rank') return groupRanks[t.label][r] ?? null;
      if (!h) return null;
      if (mode === 'value') return h.total_value;
      if (mode === 'global-rank') return h.overall_rank;
      return null;
    });
    return {
      label: t.header.team_name || t.label,
      data,
      borderColor: color,
      backgroundColor: color,
      _baseColor: color,
      borderWidth: 2,
      pointRadius: 2,
      pointHoverRadius: 4,
      tension: 0.15,
      spanGaps: true,
    };
  });

  return { rounds, datasets };
}

let trajectoryChart = null;

function dimOtherDatasets(chart, activeIndex) {
  chart.data.datasets.forEach((ds, i) => {
    ds.borderColor = i === activeIndex ? ds._baseColor : hexToRgba(ds._baseColor, 0.1);
  });
  chart.update('none');
}

function resetDatasetColors(chart) {
  chart.data.datasets.forEach(ds => { ds.borderColor = ds._baseColor; });
  chart.update('none');
}

function renderTrajectoryChart(teams, mode) {
  const canvas = document.getElementById('trajectory-chart');
  if (!canvas || typeof Chart === 'undefined') return;
  const { rounds, datasets } = buildTrajectoryDatasets(teams, mode);
  const isRank = mode !== 'value';
  const yTitle = mode === 'value' ? 'Total value (DKK)' : mode === 'group-rank' ? 'Rank in group' : 'Holdet overall rank';

  if (trajectoryChart) trajectoryChart.destroy();
  trajectoryChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels: rounds, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: true },
      scales: {
        x: { title: { display: true, text: 'Round' } },
        y: {
          reverse: isRank,
          title: { display: true, text: yTitle },
          ticks: mode === 'group-rank' ? { stepSize: 1, precision: 0 } : {},
        },
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { boxWidth: 10, font: { size: 11 } },
          onHover: (evt, item, legend) => {
            if (item.datasetIndex !== undefined) dimOtherDatasets(legend.chart, item.datasetIndex);
          },
          onLeave: (evt, item, legend) => resetDatasetColors(legend.chart),
        },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${mode === 'value' ? formatDkk(ctx.parsed.y) : ctx.parsed.y}`,
          },
        },
      },
      onHover: (evt, elements, chart) => {
        if (elements.length) {
          dimOtherDatasets(chart, elements[0].datasetIndex);
        } else {
          resetDatasetColors(chart);
        }
      },
    },
  });
}

function render(data) {
  const scrapedDate = new Date(data.scraped_at);
  document.getElementById('scraped-at').textContent =
    'Last updated ' + scrapedDate.toLocaleString('da-DK');

  const round = data.current_round;
  document.getElementById('round-badge').innerHTML = round
    ? `<span class="round-badge">Stage ${round.round}</span>`
    : '';

  const proTeamAbbr = buildProTeamAbbrMap(data.master_riders);
  const teams = data.teams || [];
  const popularity = data.group_popularity || [];
  const maxCount = Math.max(1, ...popularity.map(p => p.owned_by_count));

  const ownedByCount = {};
  for (const p of popularity) ownedByCount[`${p.name}|${p.pro_team}`] = p.owned_by_count;

  const newThisRoundByRider = {};
  for (const p of popularity) newThisRoundByRider[`${p.name}|${p.pro_team}`] = new Set(p.transferred_in_by_teams || []);

  const labelToTeamName = {};
  for (const t of teams) labelToTeamName[t.label] = t.header.team_name || t.label;

  const captainCountByRider = {};
  const captainTeamsByRider = {};
  for (const t of teams) {
    for (const r of t.roster) {
      if (!r.is_captain) continue;
      const key = `${r.name}|${r.pro_team}`;
      captainCountByRider[key] = (captainCountByRider[key] || 0) + 1;
      (captainTeamsByRider[key] || (captainTeamsByRider[key] = new Set())).add(t.label);
    }
  }

  const mostOwned = popularity[0];

  const transfersOut = data.transfers_out || [];
  const maxTransferInCount = Math.max(0, ...popularity.map(p => p.transferred_in_count || 0));
  const topTransfersIn = maxTransferInCount > 0
    ? popularity.filter(p => p.transferred_in_count === maxTransferInCount)
    : [];
  const maxTransferOutCount = Math.max(0, ...transfersOut.map(p => p.count || 0));
  const topTransfersOut = maxTransferOutCount > 0
    ? transfersOut.filter(p => p.count === maxTransferOutCount)
    : [];

  const teamTransferCounts = computeTeamTransferCounts(teams, popularity);
  const transferCountValues = Object.values(teamTransferCounts);
  const medianTransfers = median(transferCountValues);
  const avgTransfers = transferCountValues.length
    ? transferCountValues.reduce((s, n) => s + n, 0) / transferCountValues.length
    : null;
  const maxTeamTransferCount = Math.max(0, ...transferCountValues);

  const prevTransferStats = data.previous_round_transfer_stats;
  let transferCompareHtml = '';
  if (prevTransferStats && medianTransfers !== null && prevTransferStats.median !== null && prevTransferStats.median !== undefined) {
    const delta = medianTransfers - prevTransferStats.median;
    const cls = delta > 0 ? 'pts-positive' : delta < 0 ? 'pts-negative' : '';
    const arrow = delta > 0 ? '▲' : delta < 0 ? '▼' : '=';
    const deltaLabel = delta === 0 ? 'same as' : `<span class="${cls}">${arrow} ${Math.abs(delta)}</span> vs`;
    const avgText = prevTransferStats.avg !== null && prevTransferStats.avg !== undefined ? prevTransferStats.avg.toFixed(1) : '-';
    transferCompareHtml = `<div class="stat-sublabel">${deltaLabel} stage ${prevTransferStats.round} (median ${prevTransferStats.median}, avg ${avgText})</div>`;
  }

  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card stat-card--in"><div class="stat-label">${cartIcon('var(--accent)')}Most transferred in this round</div><div class="stat-value stat-value--riders">${topTransfersIn.length ? statRiderRows(topTransfersIn, proTeamAbbr) : '-'}</div><div class="stat-sublabel">${topTransfersIn.length ? maxTransferInCount + ' team' + (maxTransferInCount === 1 ? '' : 's') : 'No transfers yet'}</div></div>
      <div class="stat-card stat-card--out"><div class="stat-label">${tagIcon('var(--negative)')}Most transferred out this round</div><div class="stat-value stat-value--riders">${topTransfersOut.length ? statRiderRows(topTransfersOut, proTeamAbbr) : '-'}</div><div class="stat-sublabel">${topTransfersOut.length ? maxTransferOutCount + ' team' + (maxTransferOutCount === 1 ? '' : 's') : 'No transfers yet'}</div></div>
      <div class="stat-card"><div class="stat-label">Most owned rider</div><div class="stat-value stat-value--riders">${mostOwned ? statRiderRows([mostOwned], proTeamAbbr) : '-'}</div>${mostOwned ? `<div class="stat-sublabel">${mostOwned.owned_by_count}/${teams.length} teams</div>` : ''}</div>
      <div class="stat-card"><div class="stat-label">Median transfers this round</div><div class="stat-value">${medianTransfers !== null ? medianTransfers : '-'}</div><div class="stat-sublabel">${avgTransfers !== null ? 'avg ' + avgTransfers.toFixed(1) : ''}</div>${transferCompareHtml}</div>
    </div>
  `;

  const popularityHtml = popularity.map(p => `
    <details class="popularity-row">
      <summary>
        <div><span class="chevron">▸</span>${jerseyIcon(p.pro_team, proTeamAbbr)}<span class="rider-name">${p.name}</span>${p.transferred_in_count ? `<span class="transfer-tag">+${p.transferred_in_count} this round</span>` : ''}${captainCountByRider[`${p.name}|${p.pro_team}`] > 1 ? `<span class="crown-tag">👑 ${captainCountByRider[`${p.name}|${p.pro_team}`]}</span>` : ''}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${(p.owned_by_count / maxCount * 100).toFixed(0)}%"></div></div>
          <div class="bar-count">${p.owned_by_count}/${teams.length}</div>
        </div>
      </summary>
      <ul class="owner-list">
        ${p.owned_by_teams.map(label => `
          <li><span>${labelToTeamName[label] || label}${captainTeamsByRider[`${p.name}|${p.pro_team}`]?.has(label) ? '<span class="captain-tag">Kaptajn</span>' : ''}</span>${(p.transferred_in_by_teams || []).includes(label) ? '<span class="new-tag">New</span>' : ''}</li>
        `).join('')}
      </ul>
    </details>
  `).join('');

  const standings = [...teams].sort((a, b) => (b.value_summary.total || 0) - (a.value_summary.total || 0));
  const standingsHtml = `
    <div class="standings">
      <div class="standings-header">
        <span>#</span><span>Team</span><span class="num">Latest round pts</span><span class="num">Trades</span><span class="num">Total value</span>
      </div>
      ${standings.map((t, i) => {
        const latest = t.history && t.history.length ? t.history[t.history.length - 1] : null;
        const roster = [...t.roster].sort((a, b) => (b.value || 0) - (a.value || 0));
        const transferCount = teamTransferCounts[t.label] || 0;
        return `
          <details class="standings-row">
            <summary>
              <span>${i + 1}</span>
              <span class="team-name"><span class="chevron">▸</span>${t.header.team_name || t.label}</span>
              <span class="num">${latest ? formatSignedPts(latest.round_points) : '-'}</span>
              <span class="num">${transferPill(transferCount, maxTeamTransferCount)}</span>
              <span class="num">${formatDkk(t.value_summary.total)}</span>
            </summary>
            <ul class="roster-list">
              ${roster.map(r => `
                <li>
                  <span>${jerseyIcon(r.pro_team, proTeamAbbr)}${r.name}${r.is_captain ? '<span class="captain-tag">Kaptajn</span>' : ''}${ownedByCount[`${r.name}|${r.pro_team}`] === 1 ? '<span class="unique-tag">Unique</span>' : ''}${newThisRoundByRider[`${r.name}|${r.pro_team}`]?.has(t.label) ? '<span class="new-tag">New</span>' : ''}
                    <span style="color:var(--text-muted); font-size:12px;">${r.pro_team || ''}</span>
                  </span>
                  <span style="display:flex; align-items:center; gap:10px;">
                    ${r.round_points !== null && r.round_points !== undefined ? `<span style="font-size:12px;">${formatSignedPts(r.round_points)}</span>` : ''}
                    <span>${formatDkk(r.value)}</span>
                  </span>
                </li>
              `).join('')}
            </ul>
          </details>
        `;
      }).join('')}
    </div>
  `;

  const overlapHtml = renderOverlapMatrix(standings);

  const teamTrades = computeTeamTrades(teams, data.round_baseline);
  const totalTradesThisRound = teamTrades.reduce((s, t) => s + t.trades.length, 0);
  const pointsByRider = buildRoundPointsByRider(teams);
  const differentialWatch = computeDifferentialWatch(popularity, pointsByRider, 3);

  let transferActivityHtml;
  if (totalTradesThisRound > 0) {
    transferActivityHtml = renderTransferActivity(teamTrades, proTeamAbbr);
  } else {
    // Nothing to show for trades yet - fall back to who's scoring best this
    // round regardless of ownership, rather than leaving the module blank.
    const topScorers = Object.entries(pointsByRider)
      .filter(([, pts]) => pts > 0)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 8)
      .map(([key, pts]) => {
        const [name, pro_team] = key.split('|');
        return { name, pro_team, round_points: pts };
      });
    transferActivityHtml = `
      <p class="activity-fallback-note">No trades yet this round — here's who's scoring best on the road so far.</p>
      <div class="activity-module">
        ${topScorers.length ? topScorers.map(p => `
          <div class="activity-team">
            <div class="trade-row">${jerseyIcon(p.pro_team, proTeamAbbr)}${p.name}<span style="margin-left:auto;">${formatSignedPts(p.round_points)}</span></div>
          </div>
        `).join('') : `<div class="activity-team"><div class="activity-empty">No round data yet.</div></div>`}
      </div>
    `;
  }

  const differentialWatchHtml = renderDifferentialWatch(differentialWatch, teams.length, proTeamAbbr, labelToTeamName, 8);

  const failedHtml = (data.failed_team_ids && data.failed_team_ids.length)
    ? `<div class="error" style="margin-bottom:24px;">Failed to fetch ${data.failed_team_ids.length} team(s): ${data.failed_team_ids.join(', ')}. Check the scraper logs.</div>`
    : '';

  document.getElementById('content').innerHTML = `
    ${failedHtml}
    <div class="tabs" id="main-tabs">
      <button data-tab="overview" class="active">Overview</button>
      <button data-tab="standings">Standings</button>
      <button data-tab="trends">Trends</button>
      <button data-tab="head-to-head">Head-to-head</button>
    </div>
    <div class="tab-panel active" data-panel="overview">
      ${statsHtml}
      <div class="overview-grid">
        <div class="overview-main">
          <section>
            <h2>Rider selection in our group</h2>
            ${popularityHtml || '<p style="color:var(--text-muted)">No data yet.</p>'}
          </section>
        </div>
        <div class="overview-sidebar">
          <section>
            <h2>Transfer activity</h2>
            ${transferActivityHtml}
          </section>
          <section>
            <h2>Differential watch</h2>
            ${differentialWatchHtml}
          </section>
        </div>
      </div>
    </div>
    <div class="tab-panel" data-panel="standings">
      <section>
        <h2>Team standings</h2>
        ${standingsHtml}
      </section>
    </div>
    <div class="tab-panel" data-panel="trends">
      <section>
        <h2>Team trajectory</h2>
        <div class="chart-toggle" id="trajectory-toggle">
          <button data-mode="value" class="active">Value</button>
          <button data-mode="group-rank">Group rank</button>
          <button data-mode="global-rank">Global rank</button>
        </div>
        <div class="chart-container">
          <canvas id="trajectory-chart"></canvas>
        </div>
      </section>
    </div>
    <div class="tab-panel" data-panel="head-to-head">
      <section>
        <h2>Ownership overlap</h2>
        <p class="subtitle" style="margin-bottom:12px;">Riders shared between each pair of teams. Click a cell to see who.</p>
        ${overlapHtml}
      </section>
    </div>
  `;

  document.getElementById('trajectory-toggle').addEventListener('click', (evt) => {
    const btn = evt.target.closest('button[data-mode]');
    if (!btn) return;
    document.querySelectorAll('#trajectory-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTrajectoryChart(teams, btn.dataset.mode);
  });

  document.getElementById('main-tabs').addEventListener('click', (evt) => {
    const btn = evt.target.closest('button[data-tab]');
    if (!btn) return;
    const tab = btn.dataset.tab;
    document.querySelectorAll('#main-tabs button').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tab));
    if (tab === 'trends') {
      const mode = document.querySelector('#trajectory-toggle .active')?.dataset.mode || 'value';
      renderTrajectoryChart(teams, mode);
    }
  });

  document.querySelector('.overlap-matrix').addEventListener('click', (evt) => {
    const cell = evt.target.closest('.overlap-cell[data-row]');
    if (!cell) return;
    const i = parseInt(cell.dataset.row, 10);
    const j = parseInt(cell.dataset.col, 10);
    const teamA = standings[i];
    const teamB = standings[j];
    const shared = sharedRiders(teamA, teamB);
    const nameA = teamA.header.team_name || teamA.label;
    const nameB = teamB.header.team_name || teamB.label;
    const detail = document.getElementById('overlap-detail');
    detail.innerHTML = `
      <h3>${nameA} ↔ ${nameB} <span style="color:var(--text-muted); font-weight:400;">(${shared.length} shared)</span></h3>
      ${shared.length ? `<ul class="roster-list">${shared.map(r => `
        <li><span>${jerseyIcon(r.pro_team, proTeamAbbr)}${r.name} <span style="color:var(--text-muted); font-size:12px;">${r.pro_team || ''}</span></span></li>
      `).join('')}</ul>` : '<p style="color:var(--text-muted); font-size:13px;">No riders in common.</p>'}
    `;
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

loadData();
</script>
