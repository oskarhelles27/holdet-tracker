<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuentes Bagmænd tracker</title>
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e5e5e0;
    --text: #1a1a1a;
    --text-muted: #6b6b66;
    --accent: #1D9E75;
    --accent-bg: #E1F5EE;
    --negative: #D85A30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 64px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; }
  .subtitle { color: var(--text-muted); font-size: 13px; }
  .round-badge { display: inline-block; background: var(--accent-bg); color: var(--accent); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 6px; }
  select#round-select { font-size: 14px; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; border-left: 3px solid transparent; }
  .stat-card--in { border-left-color: var(--accent); }
  .stat-card--out { border-left-color: var(--negative); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-arrow-in::before { content: "↑"; color: var(--accent); font-weight: 700; }
  .stat-arrow-out::before { content: "↓"; color: var(--negative); font-weight: 700; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-sublabel { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  h2 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
  section { margin-bottom: 36px; }

  .popularity-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
  .popularity-row .rider-name { font-weight: 500; font-size: 14px; }
  .popularity-row .pro-team { font-size: 12px; color: var(--text-muted); margin-left: 6px; }
  .jersey-icon { width: 18px; height: 18px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: 6px; background: var(--bg); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-track { width: 120px; height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); }
  .bar-count { font-size: 13px; color: var(--text-muted); width: 40px; text-align: right; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--text-muted); font-weight: 500; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; }

  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; }
  .team-card summary { cursor: pointer; font-weight: 500; font-size: 14px; list-style: none; display: flex; justify-content: space-between; align-items: center; }
  .team-card summary::-webkit-details-marker { display: none; }
  .team-card ul { list-style: none; padding: 0; margin: 12px 0 0; }
  .team-card li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .team-card li:last-child { border-bottom: none; }
  .captain-tag { font-size: 11px; background: #FAEEDA; color: #854F0B; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .transfer-tag { font-size: 11px; background: var(--accent-bg); color: var(--accent); padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; }

  .pts-positive { color: var(--accent); font-weight: 500; }
  .pts-negative { color: var(--negative); font-weight: 500; }

  .error { background: #FCEBEB; color: #791F1F; padding: 12px 16px; border-radius: 8px; }
  .loading { color: var(--text-muted); padding: 24px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Fuentes Bagmænd tracker</h1>
      <div class="subtitle" id="scraped-at">Loading...</div>
      <div id="round-badge"></div>
    </div>
  </header>

  <div id="content">
    <div class="loading">Loading data...</div>
  </div>
</div>

<script>
async function loadData() {
  const contentEl = document.getElementById('content');
  try {
    const res = await fetch('data/latest.json?_=' + Date.now());
    if (!res.ok) throw new Error('No data yet - run the scraper at least once (see README).');
    const data = await res.json();
    render(data);
  } catch (err) {
    contentEl.innerHTML = `<div class="error">Couldn't load data: ${err.message}</div>`;
  }
}

function formatDkk(n) {
  if (n === null || n === undefined) return '-';
  return n.toLocaleString('da-DK');
}

function formatSignedPts(n) {
  if (n === null || n === undefined) return '-';
  const cls = n < 0 ? 'pts-negative' : 'pts-positive';
  const sign = n < 0 ? '-' : '+';
  return `<span class="${cls}">${sign}${Math.abs(n).toLocaleString('da-DK')}</span>`;
}

function buildProTeamAbbrMap(masterRiders) {
  const map = {};
  for (const rider of Object.values(masterRiders || {})) {
    if (rider.pro_team && rider.pro_team_abbr) map[rider.pro_team] = rider.pro_team_abbr;
  }
  return map;
}

function jerseyIcon(proTeam, abbrMap) {
  const abbr = abbrMap[proTeam];
  if (!abbr) return '';
  return `<img class="jersey-icon" src="assets/jerseys/${abbr}.png" alt="" onerror="this.remove()">`;
}

function render(data) {
  const scrapedDate = new Date(data.scraped_at);
  document.getElementById('scraped-at').textContent =
    'Last updated ' + scrapedDate.toLocaleString('da-DK');

  const round = data.current_round;
  document.getElementById('round-badge').innerHTML = round
    ? `<span class="round-badge">Round ${round.round}${round.end ? ' · ended ' + new Date(round.end).toLocaleDateString('da-DK') : ''}</span>`
    : '';

  const proTeamAbbr = buildProTeamAbbrMap(data.master_riders);
  const teams = data.teams || [];
  const popularity = data.group_popularity || [];
  const maxCount = Math.max(1, ...popularity.map(p => p.owned_by_count));

  const mostOwned = popularity[0];

  const transfersOut = data.transfers_out || [];
  const maxTransferInCount = Math.max(0, ...popularity.map(p => p.transferred_in_count || 0));
  const topTransfersIn = maxTransferInCount > 0
    ? popularity.filter(p => p.transferred_in_count === maxTransferInCount)
    : [];
  const maxTransferOutCount = Math.max(0, ...transfersOut.map(p => p.count || 0));
  const topTransfersOut = maxTransferOutCount > 0
    ? transfersOut.filter(p => p.count === maxTransferOutCount)
    : [];

  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card stat-card--in"><div class="stat-label stat-arrow-in">Most transferred in this round</div><div class="stat-value">${topTransfersIn.length ? topTransfersIn.map(p => p.name).join(', ') : '-'}</div><div class="stat-sublabel">${topTransfersIn.length ? maxTransferInCount + ' team' + (maxTransferInCount === 1 ? '' : 's') : 'No transfers yet'}</div></div>
      <div class="stat-card stat-card--out"><div class="stat-label stat-arrow-out">Most transferred out this round</div><div class="stat-value">${topTransfersOut.length ? topTransfersOut.map(p => p.name).join(', ') : '-'}</div><div class="stat-sublabel">${topTransfersOut.length ? maxTransferOutCount + ' team' + (maxTransferOutCount === 1 ? '' : 's') : 'No transfers yet'}</div></div>
      <div class="stat-card"><div class="stat-label">Most owned rider</div><div class="stat-value">${mostOwned ? mostOwned.name : '-'}</div>${mostOwned ? `<div class="stat-sublabel">${mostOwned.owned_by_count}/${teams.length} teams</div>` : ''}</div>
    </div>
  `;

  const popularityHtml = popularity.slice(0, 15).map(p => `
    <div class="popularity-row">
      <div>${jerseyIcon(p.pro_team, proTeamAbbr)}<span class="rider-name">${p.name}</span><span class="pro-team">${p.pro_team || ''}</span>${p.transferred_in_count ? `<span class="transfer-tag">+${p.transferred_in_count} this round</span>` : ''}</div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" style="width:${(p.owned_by_count / maxCount * 100).toFixed(0)}%"></div></div>
        <div class="bar-count">${p.owned_by_count}/${teams.length}</div>
      </div>
    </div>
  `).join('');

  const standings = [...teams].sort((a, b) => (b.value_summary.total || 0) - (a.value_summary.total || 0));
  const standingsHtml = `
    <table>
      <thead><tr>
        <th>#</th><th>Team</th><th class="num">Latest round pts</th><th class="num">Total value</th>
      </tr></thead>
      <tbody>
        ${standings.map((t, i) => {
          const latest = t.history && t.history.length ? t.history[t.history.length - 1] : null;
          return `<tr>
            <td>${i + 1}</td>
            <td>${t.header.team_name || t.label}</td>
            <td class="num">${latest ? formatSignedPts(latest.round_points) : '-'}</td>
            <td class="num">${formatDkk(t.value_summary.total)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;

  const rosterHtml = teams.map(t => `
    <details class="team-card">
      <summary>
        <span>${t.header.team_name || t.label}</span>
        <span style="color:var(--text-muted); font-weight:400;">${formatDkk(t.value_summary.total)}</span>
      </summary>
      <ul>
        ${t.roster.map(r => `
          <li>
            <span>${jerseyIcon(r.pro_team, proTeamAbbr)}${r.name}${r.is_captain ? '<span class="captain-tag">Kaptajn</span>' : ''}
              <span style="color:var(--text-muted); font-size:12px;">${r.pro_team || ''}</span>
            </span>
            <span>${formatDkk(r.value)}</span>
          </li>
        `).join('')}
      </ul>
    </details>
  `).join('');

  const failedHtml = (data.failed_team_ids && data.failed_team_ids.length)
    ? `<div class="error" style="margin-bottom:24px;">Failed to fetch ${data.failed_team_ids.length} team(s): ${data.failed_team_ids.join(', ')}. Check the scraper logs.</div>`
    : '';

  document.getElementById('content').innerHTML = `
    ${failedHtml}
    ${statsHtml}
    <section>
      <h2>Most popular riders in our group</h2>
      ${popularityHtml || '<p style="color:var(--text-muted)">No data yet.</p>'}
    </section>
    <section>
      <h2>Team standings</h2>
      ${standingsHtml}
    </section>
    <section>
      <h2>Team rosters</h2>
      ${rosterHtml}
    </section>
  `;
}

loadData();
</script>
</body>
</html>
